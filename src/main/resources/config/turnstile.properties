# Cloudflare Turnstile Configuration
# Provide site and secret keys via environment-specific configuration.
io.github.sanwenyukaochi.cloudflare.turnstile.site-key=
io.github.sanwenyukaochi.cloudflare.turnstile.secret=
io.github.sanwenyukaochi.cloudflare.turnstile.url=https://challenges.cloudflare.com/turnstile/v0/siteverify

# Timeout configuration (in seconds)
io.github.sanwenyukaochi.cloudflare.turnstile.connect-timeout=5
io.github.sanwenyukaochi.cloudflare.turnstile.read-timeout=10

# Configuration for TurnstileCaptchaFilter component (for use with Spring Security Form Login, etc...)
io.github.sanwenyukaochi.cloudflare.turnstile.login.submissionPath=/login
io.github.sanwenyukaochi.cloudflare.turnstile.login.redirectUrl=/login?error=captcha
io.github.sanwenyukaochi.cloudflare.turnstile.token.parameterName=cf-turnstile-response

# Monitoring and metrics configuration
io.github.sanwenyukaochi.cloudflare.turnstile.metrics.enabled=true
io.github.sanwenyukaochi.cloudflare.turnstile.metrics.health-check-enabled=true
io.github.sanwenyukaochi.cloudflare.turnstile.metrics.error-threshold=10
