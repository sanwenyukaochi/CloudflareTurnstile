# Cloudflare Turnstile Configuration
# Provide site and secret keys via environment-specific configuration.
io.turnstile.cloudflare.sitekey=0x4AAAAAACB-LgzYe9zMC2zJ
io.turnstile.cloudflare.secret=0x4AAAAAACB-LoyXBWMCd-9vVZRnvDI_Pwg
io.turnstile.cloudflare.url=https://challenges.cloudflare.com/turnstile/v0/siteverify

# Timeout configuration (in seconds)
io.turnstile.cloudflare.connect-timeout=5
io.turnstile.cloudflare.read-timeout=10

# Configuration for TurnstileCaptchaFilter component (for use with Spring Security Form Login, etc...)
io.turnstile.cloudflare.login.submissionPath=/login
io.turnstile.cloudflare.login.redirectUrl=/login?error=captcha
io.turnstile.cloudflare.token.parameterName=cf-turnstile-response

# Monitoring and metrics configuration
io.turnstile.cloudflare.metrics.enabled=true
io.turnstile.cloudflare.metrics.health-check-enabled=true
io.turnstile.cloudflare.metrics.error-threshold=10
